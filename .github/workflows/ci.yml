name: foodgram-ui-tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull browser image
        run: docker pull selenoid/chrome:128.0

      - name: Start Selenoid
        run: docker compose up -d selenoid

      - name: Wait for Selenoid
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4444/status > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Selenoid did not become ready in time"
          docker compose logs selenoid
          exit 1

      - name: Run tests
        env:
          BASE_URL: https://foodgram-frontend-1.prakticum-team.ru/
          SELENOID_URL: http://localhost:4444/wd/hub
          BROWSER_NAME: chrome
          BROWSER_VERSION: "128.0"
        run: pytest tests --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Print Selenoid logs
        if: always()
        run: docker compose logs selenoid

      - name: Stop containers
        if: always()
        run: docker compose down -v
